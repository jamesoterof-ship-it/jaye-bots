<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>Jaye Group · Control de Bots</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--bg:#0e0f13;--bg2:#0c0d11;--card:#16181e;--card2:#1a1c22;--line:#23252e;--line2:#2e313c;--txt:#e8e8ea;--muted:#888d99;--dim:#6b6f7a;--gold:#e0a93b;--gold-soft:rgba(224,169,59,.14);--teal:#2dd4bf;--coral:#fb7185;--amber:#fbbf24;--green:#3ec27e;--green-soft:rgba(62,194,126,.14);--amber-soft:rgba(251,191,36,.14);--red:#ef4444;--wa:#25d366}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--txt);height:100vh;height:100dvh;display:flex;flex-direction:column;overflow:hidden;-webkit-font-smoothing:antialiased}
svg{width:100%;height:100%;display:block}
.head{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border-bottom:1px solid var(--line);flex-shrink:0;background:var(--bg2)}
.lg{font-weight:700;font-size:15px;letter-spacing:.5px;color:#fff}.lg b{color:var(--gold)}
.bell{width:40px;height:40px;border-radius:11px;background:var(--card);border:1px solid var(--line);display:grid;place-items:center;color:var(--muted);position:relative;cursor:pointer}
.bell svg{width:19px;height:19px;stroke:currentColor;fill:none;stroke-width:1.8}
.bdg{position:absolute;top:-5px;right:-5px;background:var(--red);color:#fff;font-size:10px;font-weight:700;min-width:18px;height:18px;border-radius:9px;display:none;place-items:center;padding:0 4px;border:2px solid var(--bg2)}
.chips{display:flex;gap:7px;padding:11px 14px;overflow-x:auto;flex-shrink:0;border-bottom:1px solid #1a1c22}
.chips::-webkit-scrollbar{display:none}
.chip{display:flex;align-items:center;gap:6px;background:var(--card);border:1px solid var(--line);color:var(--muted);font-size:13px;font-weight:500;padding:8px 14px;border-radius:22px;white-space:nowrap;cursor:pointer;flex-shrink:0}
.chip.on{border-color:var(--gold);color:var(--gold)}
.chip .fl{width:18px;height:12px;flex-shrink:0}
.content{flex:1;overflow-y:auto;padding:15px 14px 20px}
.view{display:none}.view.on{display:block}
.kgrid{display:grid;grid-template-columns:1fr 1fr;gap:11px;margin-bottom:6px}
.kpi{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:15px}
.kpi .ic{width:38px;height:38px;border-radius:11px;display:grid;place-items:center;margin-bottom:11px;color:var(--gold);background:var(--gold-soft)}
.kpi.green .ic{color:var(--green);background:var(--green-soft)}.kpi.amber .ic{color:var(--amber);background:var(--amber-soft)}.kpi.teal .ic{color:var(--teal);background:rgba(45,212,191,.14)}.kpi.wa .ic{color:var(--wa);background:rgba(37,211,102,.14)}
.kpi .ic svg{width:20px;height:20px;stroke:currentColor;fill:none;stroke-width:1.8}.kpi.wa .ic svg{fill:currentColor;stroke:none}
.kpi .num{font-size:26px;font-weight:600}.kpi .lbl{font-size:12px;color:var(--muted);margin-top:2px}
.sect{font-size:13px;color:var(--muted);font-weight:500;margin:20px 0 10px}
.srch{display:flex;align-items:center;gap:9px;background:var(--card);border:1px solid var(--line);border-radius:12px;padding:0 13px;margin-bottom:11px}
.srch svg{width:17px;height:17px;stroke:var(--muted);fill:none;stroke-width:1.8;flex-shrink:0}
.srch input{flex:1;background:none;border:none;outline:none;color:var(--txt);font-size:14px;padding:12px 0;font-family:inherit}
.fest{display:flex;gap:8px;margin-bottom:13px}
.fest button{flex:1;background:var(--card);border:1px solid var(--line);color:var(--muted);font-size:12.5px;font-weight:500;padding:9px;border-radius:9px;cursor:pointer;font-family:inherit}
.fest button.on{border-color:var(--gold);color:var(--gold)}
.crow{display:flex;align-items:center;gap:12px;padding:13px 0;border-bottom:1px solid #1a1c22;cursor:pointer}
.av{width:44px;height:44px;border-radius:50%;background:var(--card);border:1.5px solid var(--gold);color:var(--gold);display:grid;place-items:center;font-weight:600;font-size:15px;flex-shrink:0;position:relative}
.av .pres{position:absolute;bottom:0;right:0;width:11px;height:11px;border-radius:50%;border:2px solid var(--bg)}
.ci{flex:1;min-width:0}
.cn{font-size:15px;font-weight:500;display:flex;align-items:center;gap:7px}
.cn .fl{width:17px;height:11px;flex-shrink:0}
.cp{font-size:12px;color:var(--dim);margin-top:1px}
.cm{font-size:12.5px;color:var(--muted);margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:200px}
.cmeta{display:flex;flex-direction:column;align-items:flex-end;gap:6px;flex-shrink:0}
.pill{font-size:11px;font-weight:600;padding:4px 9px;border-radius:7px}
.pill.activa{background:var(--green-soft);color:var(--green)}.pill.pausada{background:var(--amber-soft);color:var(--amber)}
.botcard{display:flex;align-items:center;gap:13px;background:var(--card);border:1px solid var(--line);border-radius:14px;padding:15px;margin-bottom:11px}
.botcard .ba{width:46px;height:46px;border-radius:13px;display:grid;place-items:center;flex-shrink:0}
.botcard .ba svg{width:23px;height:23px;stroke:currentColor;fill:none;stroke-width:1.7}
.botcard .bi{flex:1;min-width:0}
.botcard .bn{font-size:15px;font-weight:500;display:flex;align-items:center;gap:7px}.botcard .bn .fl{width:17px;height:11px}
.botcard .bs{font-size:12.5px;color:var(--muted);margin-top:2px}
.tg{width:46px;height:27px;border-radius:14px;position:relative;flex-shrink:0;cursor:pointer;transition:.2s}
.tg.on{background:var(--green)}.tg.off{background:var(--line2)}
.tg::after{content:"";position:absolute;width:21px;height:21px;border-radius:50%;background:#fff;top:3px;transition:.2s}
.tg.on::after{right:3px}.tg.off::after{left:3px}
.pais{background:var(--card);border:1px solid var(--line);border-radius:15px;padding:16px;margin-bottom:12px}
.pais .ph{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.pais .pn{display:flex;align-items:center;gap:8px;font-size:15px;font-weight:500}.pais .pn .fl{width:20px;height:13px}
.pais .cur{font-size:12px;font-weight:500;padding:4px 10px;border-radius:7px}
.pais .big{font-size:25px;font-weight:600}
.pais .sub{font-size:12.5px;color:var(--muted);margin-top:6px}
.orow{display:flex;align-items:center;gap:12px;padding:13px 0;border-bottom:1px solid #1a1c22;cursor:pointer}
.obox{width:44px;height:44px;border-radius:12px;background:var(--card);border:1px solid var(--line);color:var(--muted);display:grid;place-items:center;flex-shrink:0}
.obox svg{width:21px;height:21px;stroke:currentColor;fill:none;stroke-width:1.6}
.oamt{font-size:14px;font-weight:600;flex-shrink:0;text-align:right}
.oamt .od{font-size:11px;color:var(--dim);font-weight:400;margin-top:2px}
.bar{display:flex;align-items:center;gap:11px;margin-bottom:14px}
.bar .bn{font-size:13px;color:var(--txt);width:74px;display:flex;align-items:center;gap:6px;flex-shrink:0}.bar .bn .fl{width:16px;height:11px}
.track{flex:1;height:10px;background:var(--card2);border-radius:6px;overflow:hidden}
.fill{height:100%;border-radius:6px}
.bar .bv{font-size:13px;font-weight:600;width:34px;text-align:right;flex-shrink:0}
.tkt{background:var(--card);border:1px solid var(--line);border-radius:13px;padding:14px;font-size:12.5px;color:var(--muted);line-height:1.9;margin-top:16px}
.tkt b{color:var(--txt)}
.empty{text-align:center;color:var(--muted);padding:40px 0;font-size:13px}
.nav{display:flex;border-top:1px solid var(--line);background:var(--bg2);flex-shrink:0;padding-bottom:env(safe-area-inset-bottom)}
.navb{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;padding:10px 0 9px;color:var(--dim);cursor:pointer;font-size:10px;font-weight:500;border:none;background:none;font-family:inherit}
.navb svg{width:23px;height:23px;stroke:currentColor;fill:none;stroke-width:1.7}
.navb.on{color:var(--gold)}
.ov{position:fixed;inset:0;background:var(--bg);z-index:50;display:flex;flex-direction:column;transform:translateX(100%);transition:transform .22s ease}
.ov.on{transform:translateX(0)}
.ovh{display:flex;align-items:center;gap:12px;padding:13px 14px;border-bottom:1px solid var(--line);flex-shrink:0;background:var(--bg2)}
.bk{width:38px;height:38px;border-radius:11px;background:var(--card);border:1px solid var(--line);color:var(--muted);display:grid;place-items:center;flex-shrink:0;cursor:pointer}
.bk svg{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:2}
.ovh .oi{flex:1;min-width:0}
.ovh .on1{font-size:15px;font-weight:500;display:flex;align-items:center;gap:7px}.ovh .on1 .fl{width:18px;height:12px}
.ovh .on2{font-size:12px;color:var(--muted);margin-top:1px}
.ovh .wa{width:38px;height:38px;border-radius:11px;background:rgba(37,211,102,.13);border:1px solid rgba(37,211,102,.3);color:var(--wa);display:grid;place-items:center;flex-shrink:0}
.ovh .wa svg{width:18px;height:18px;fill:currentColor}
.msgs{flex:1;overflow-y:auto;padding:16px 14px;display:flex;flex-direction:column;gap:11px}
.msg{max-width:80%;padding:10px 13px;border-radius:14px;font-size:14px;line-height:1.45;word-wrap:break-word}
.msg.cliente{align-self:flex-start;background:var(--card);border:1px solid var(--line);border-bottom-left-radius:4px}
.msg.bot,.msg.agente{align-self:flex-end;background:#15412e;color:#d7f7e4;border-bottom-right-radius:4px}
.msg .tag{display:block;font-size:10px;font-weight:600;opacity:.7;margin-bottom:3px}
.msg .mt{display:block;font-size:10px;opacity:.6;margin-top:4px;text-align:right}
.rnote{font-size:11px;color:var(--dim);text-align:center;padding:8px 14px 0}
.rbox{display:flex;align-items:center;gap:10px;padding:12px 14px;border-top:1px solid var(--line);flex-shrink:0;padding-bottom:calc(12px + env(safe-area-inset-bottom))}
.rbox input{flex:1;background:var(--card);border:1px solid var(--line);border-radius:22px;padding:11px 16px;color:var(--txt);font-size:14px;outline:none;font-family:inherit}
.rbox .snd{width:44px;height:44px;border-radius:50%;background:var(--wa);color:#fff;display:grid;place-items:center;flex-shrink:0;border:none;cursor:pointer}
.rbox .snd svg{width:20px;height:20px;stroke:currentColor;fill:none;stroke-width:2}
.obody{flex:1;overflow-y:auto;padding:6px 16px 20px}
.drow{display:flex;justify-content:space-between;gap:16px;padding:13px 0;border-bottom:1px solid #1a1c22;font-size:14px}
.drow .k{color:var(--muted);flex-shrink:0}
.drow .v{color:var(--txt);text-align:right;font-weight:500;word-break:break-word}
.wabig{display:flex;align-items:center;justify-content:center;gap:9px;margin:18px 0 4px;padding:14px;border-radius:13px;background:rgba(37,211,102,.13);border:1px solid rgba(37,211,102,.3);color:var(--wa);font-size:14px;font-weight:600;cursor:pointer;text-decoration:none}
.wabig svg{width:19px;height:19px;fill:currentColor}
.noti{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:60;display:none}
.noti.on{display:block}
.notibox{position:absolute;top:0;right:0;width:88%;max-width:360px;height:100%;background:var(--bg);border-left:1px solid var(--line);display:flex;flex-direction:column;transform:translateX(100%);transition:transform .22s}
.noti.on .notibox{transform:translateX(0)}
.nh{display:flex;align-items:center;justify-content:space-between;padding:16px 16px;border-bottom:1px solid var(--line)}
.nh b{font-size:16px}
.nx{background:var(--card);border:1px solid var(--line);color:var(--muted);width:34px;height:34px;border-radius:9px;font-size:18px;cursor:pointer}
.nlist{flex:1;overflow-y:auto;padding:12px}
.nrow{display:flex;align-items:flex-start;gap:11px;background:var(--card);border:1px solid var(--line);border-radius:12px;padding:13px;margin-bottom:10px}
.nrow .nico{width:36px;height:36px;border-radius:10px;display:grid;place-items:center;flex-shrink:0}
.nrow .nico svg{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:2}
.nrow .ninf{flex:1}.nrow .ninf b{font-size:13.5px}.nrow .ns{font-size:12px;color:var(--muted);margin-top:2px}
.nempty{text-align:center;color:var(--muted);padding:40px 0;font-size:13px}
</style>
</head>
<body>
<div class="head">
 <span class="lg"><b>JAYE</b> GROUP</span>
 <div class="bell" id="bellBtn"><svg viewBox="0 0 24 24"><path d="M18 8a6 6 0 0 0-12 0c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.7 21a2 2 0 0 1-3.4 0"/></svg><span class="bdg" id="bellBdg"></span></div>
</div>
<div class="chips" id="chips"></div>
<div class="content">
 <div class="view on" id="v-inicio">
  <div class="kgrid" id="kpis"><div class="empty" style="grid-column:1/3">Cargando…</div></div>
  <div class="sect">Ventas de hoy</div>
  <div id="hoyList"><div class="empty">Cargando…</div></div>
 </div>
 <div class="view" id="v-chats">
  <div class="srch"><svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4-4"/></svg><input id="buscar" placeholder="Buscar conversación..." oninput="renderChats()"></div>
  <div class="fest">
   <button class="on" data-est="">Todas</button>
   <button data-est="activa">Activas</button>
   <button data-est="pausada">Pausadas</button>
  </div>
  <div id="chatlist"><div class="empty">Cargando conversaciones…</div></div>
 </div>
 <div class="view" id="v-bots"><div id="botlist"></div></div>
 <div class="view" id="v-ventas">
  <div id="paises"></div>
  <div class="sect">Últimos pedidos</div>
  <div id="orders"></div>
 </div>
 <div class="view" id="v-rep">
  <div class="sect" style="margin-top:0">Pedidos por bot (este mes)</div>
  <div id="ranking"></div>
  <div class="tkt" id="ticket"></div>
 </div>
</div>
<div class="nav" id="nav">
 <button class="navb on" data-v="inicio"><svg viewBox="0 0 24 24"><path d="M3 10l9-7 9 7v9a2 2 0 0 1-2 2h-4v-6H9v6H5a2 2 0 0 1-2-2z"/></svg>Inicio</button>
 <button class="navb" data-v="chats"><svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>Chats</button>
 <button class="navb" data-v="bots"><svg viewBox="0 0 24 24"><rect x="4" y="8" width="16" height="12" rx="2"/><path d="M12 8V4M9 13h.01M15 13h.01M9 17h6"/></svg>Bots</button>
 <button class="navb" data-v="ventas"><svg viewBox="0 0 24 24"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><path d="M3 6h18M16 10a4 4 0 0 1-8 0"/></svg>Ventas</button>
 <button class="navb" data-v="rep"><svg viewBox="0 0 24 24"><path d="M3 3v18h18"/><path d="M7 14l4-4 3 3 5-6"/></svg>Reportes</button>
</div>

<div class="ov" id="ovchat">
 <div class="ovh">
  <div class="bk" onclick="cerrarChat()"><svg viewBox="0 0 24 24"><path d="M19 12H5M12 19l-7-7 7-7"/></svg></div>
  <div class="oi"><div class="on1" id="mc_name"></div><div class="on2" id="mc_st"></div></div>
  <a class="wa" id="mc_wa" target="_blank"><svg viewBox="0 0 24 24"><path d="M12 2a10 10 0 0 0-8.5 15.2L2 22l4.9-1.5A10 10 0 1 0 12 2zm0 18a8 8 0 0 1-4.1-1.1l-.3-.2-2.9.9.9-2.8-.2-.3A8 8 0 1 1 12 20zm4.4-5.6c-.2-.1-1.4-.7-1.6-.8s-.4-.1-.5.1-.6.8-.8 1-.3.2-.5 0a6.5 6.5 0 0 1-3.2-2.8c-.2-.4.2-.4.6-1.2 0-.2 0-.3 0-.5s-.5-1.3-.7-1.7-.4-.4-.5-.4h-.5a1 1 0 0 0-.7.3 3 3 0 0 0-.9 2.2c0 1.3 1 2.6 1.1 2.8s1.9 2.9 4.6 4c1.7.7 2.4.8 3.2.7.5-.1 1.4-.6 1.6-1.1s.2-1 .1-1.1-.2-.2-.4-.3z"/></svg></a>
 </div>
 <div class="msgs" id="mc_msgs"></div>
 <div class="rnote" id="mc_note"></div>
 <div class="rbox"><input id="mc_input" placeholder="Escribe una respuesta..."><button class="snd" onclick="sendMsg()"><svg viewBox="0 0 24 24"><path d="M22 2L11 13M22 2l-7 20-4-9-9-4z"/></svg></button></div>
</div>

<div class="ov" id="ovorden">
 <div class="ovh">
  <div class="bk" onclick="cerrarOrden()"><svg viewBox="0 0 24 24"><path d="M19 12H5M12 19l-7-7 7-7"/></svg></div>
  <div class="oi"><div class="on1" id="mo_name"></div><div class="on2" id="mo_st"></div></div>
 </div>
 <div class="obody" id="mo_body"></div>
</div>

<div class="noti" id="noti">
 <div class="notibox">
  <div class="nh"><b>Notificaciones</b><button class="nx" id="notiClose">×</button></div>
  <div class="nlist" id="nlist"></div>
 </div>
</div>

<script>
const BASE='https://n8n-production-8a42.up.railway.app/webhook';
const URL_CONV=BASE+'/leer-conversaciones';
const URL_PAUSA=BASE+'/pausar-activar';
const URL_VENTAS=BASE+'/ventas';
const URL_HIST=BASE+'/historial';
const URL_RESP=BASE+'/responder';

let currentBot='todos',sel=-1,fEst='';
const COL={Carlos:'#2dd4bf',Ramon:'#fb7185',James:'#fbbf24'};
const FLAG={CL:`<svg class="fl" viewBox="0 0 30 20"><rect width="30" height="20" fill="#fff"/><rect width="30" height="10" y="10" fill="#D52B1E"/><rect width="10" height="10" fill="#0039A6"/><polygon points="5,2.2 5.9,4.2 8,4.2 6.3,5.5 6.9,7.6 5,6.3 3.1,7.6 3.7,5.5 2,4.2 4.1,4.2" fill="#fff"/></svg>`,PY:`<svg class="fl" viewBox="0 0 30 20"><rect width="30" height="6.67" fill="#D52B1E"/><rect width="30" height="6.67" y="6.67" fill="#fff"/><rect width="30" height="6.66" y="13.33" fill="#0038A8"/><circle cx="15" cy="10" r="2.4" fill="#fff"/><circle cx="15" cy="10" r="1" fill="#2E7D32"/></svg>`,CO:`<svg class="fl" viewBox="0 0 30 20"><rect width="30" height="10" fill="#FCD116"/><rect width="30" height="5" y="10" fill="#003893"/><rect width="30" height="5" y="15" fill="#CE1126"/></svg>`};
const WA=`<svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2a10 10 0 0 0-8.5 15.2L2 22l4.9-1.5A10 10 0 1 0 12 2zm0 18a8 8 0 0 1-4.1-1.1l-.3-.2-2.9.9.9-2.8-.2-.3A8 8 0 1 1 12 20zm4.4-5.6c-.2-.1-1.4-.7-1.6-.8s-.4-.1-.5.1-.6.8-.8 1-.3.2-.5 0a6.5 6.5 0 0 1-3.2-2.8c-.2-.4.2-.4.6-1.2 0-.2 0-.3 0-.5s-.5-1.3-.7-1.7-.4-.4-.5-.4h-.5a1 1 0 0 0-.7.3 3 3 0 0 0-.9 2.2c0 1.3 1 2.6 1.1 2.8s1.9 2.9 4.6 4c1.7.7 2.4.8 3.2.7.5-.1 1.4-.6 1.6-1.1s.2-1 .1-1.1-.2-.2-.4-.3z"/></svg>`;
const BOTLOC={Carlos:'CL',Ramon:'PY',James:'CO'};
const CUR={CL:['CLP','rgba(45,212,191,.14)','#2dd4bf'],PY:['Gs','rgba(251,113,133,.14)','#fb7185'],CO:['COP','rgba(251,191,36,.14)','#fbbf24']};
const PAIS={CL:'Chile',PY:'Paraguay',CO:'Colombia'};

let convos=[], ordenes=[];
let totCL=0,totPY=0,totCO=0,cntCL=0,cntPY=0,cntCO=0,prodCL=0,prodPY=0,prodCO=0;
let notis=[]; const dismissed=new Set();

const ini=n=>(n||'').replace(/[^a-zA-ZÀ-ÿ ]/g,'').split(' ').filter(Boolean).slice(0,2).map(w=>w[0]).join('').toUpperCase()||'#';
const soloNum=t=>String(t||'').replace(/[^0-9]/g,'');
const botName=b=>b==='Ramon'?'Ramón':b==='James'?'James':'Carlos';
const fmtCLP=n=>'$'+Math.round(n).toLocaleString('es-CL');
const fmtGS=n=>'₲ '+Math.round(n).toLocaleString('es-PY');
const fmtCOP=n=>'$'+Math.round(n).toLocaleString('es-CO');
const fmtLoc=(loc,n)=>loc==='PY'?fmtGS(n):loc==='CO'?fmtCOP(n):fmtCLP(n);
const numero=x=>parseInt(String(x||'').replace(/[^0-9]/g,''))||0;
function esHoy(f){if(!f)return false;const h=new Date();const p=String(f).split(',')[0].trim().split(/[\/\-]/);return p.length>=3&&+p[0]===h.getDate()&&+p[1]===h.getMonth()+1&&+p[2]===h.getFullYear();}
function esMes(f){if(!f)return false;const h=new Date();const p=String(f).split(',')[0].trim().split(/[\/\-]/);return p.length>=3&&+p[1]===h.getMonth()+1&&+p[2]===h.getFullYear();}
function ordenDe(fecha,hora){let f=0;if(fecha){const p=String(fecha).trim().split(/[\/\-]/);if(p.length>=3)f=+p[2]*10000+ +p[1]*100+ +p[0];}let min=0;if(hora){const h=String(hora).toLowerCase();const mm=h.match(/(\d{1,2}):(\d{2})/);if(mm){let hh=+mm[1];const mi=+mm[2];if(h.includes('p')&&hh<12)hh+=12;if(h.includes('a')&&hh===12)hh=0;min=hh*60+mi;}}return f*10000+min;}
const byBot=a=>currentBot==='todos'?a:a.filter(c=>c.bot===currentBot);

function renderChips(){
 const bots=[['todos','Todos',''],['Carlos','Carlos','CL'],['Ramon','Ramón','PY'],['James','James','CO']];
 document.getElementById('chips').innerHTML=bots.map(b=>
  '<div class="chip '+(currentBot===b[0]?'on':'')+'" onclick="setBot(\''+b[0]+'\')">'+(b[2]?FLAG[b[2]]:'')+b[1]+'</div>').join('');
}
function setBot(b){currentBot=b;renderChips();refreshActive();}

function normConv(r){
 const tel=soloNum(r.TELEFONO);
 const bot=String(r.BOT||'').trim().toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');
 const modo=String(r.MODO||'bot').trim().toLowerCase();
 const esR=bot.includes('ramon'),esJ=bot.includes('james');
 return {n:r.NOMBRE||tel||'Sin nombre', tel, ultimo:r.ULTIMO_MENSAJE||'', hora:r.HORA||'', fecha:r.FECHA||'', orden:ordenDe(r.FECHA,r.HORA), bot:esR?'Ramon':esJ?'James':'Carlos', loc:esR?'PY':esJ?'CO':'CL', estado:modo==='agente'?'pausada':'activa', msgs:[], loaded:false};
}
async function cargarConvos(){
 try{
  const res=await fetch(URL_CONV); const data=await res.json();
  const rows=Array.isArray(data)?data:(data.body||[]);
  convos=rows.filter(r=>r&&r.TELEFONO).map(normConv).sort((a,b)=>b.orden-a.orden);
  renderKpis(); renderChats(); renderBots(); construirNoti();
 }catch(e){ document.getElementById('chatlist').innerHTML='<div class="empty" style="color:var(--red)">Error cargando conversaciones</div>'; }
}
function renderKpis(){
 const base=byBot(convos);
 const act=base.filter(c=>c.estado==='activa').length, pau=base.filter(c=>c.estado==='pausada').length;
 const tot=base.length, ef=Math.round(act/((act+pau)||1)*100);
 document.getElementById('kpis').innerHTML=
 '<div class="kpi wa"><div class="ic">'+WA+'</div><div class="num">'+tot+'</div><div class="lbl">Conversaciones</div></div>'+
 '<div class="kpi green"><div class="ic"><svg viewBox="0 0 24 24"><path d="M5 3l14 9-14 9V3z"/></svg></div><div class="num">'+act+'</div><div class="lbl">Activas</div></div>'+
 '<div class="kpi amber"><div class="ic"><svg viewBox="0 0 24 24"><path d="M6 4h4v16H6zM14 4h4v16h-4z"/></svg></div><div class="num">'+pau+'</div><div class="lbl">Pausadas</div></div>'+
 '<div class="kpi teal"><div class="ic"><svg viewBox="0 0 24 24"><path d="M22 7l-9 9-4-4-6 6"/><path d="M16 7h6v6"/></svg></div><div class="num">'+ef+'%</div><div class="lbl">Efectividad</div></div>';
}
function renderChats(){
 const q=(document.getElementById('buscar').value||'').toLowerCase();
 const rows=byBot(convos).filter(c=>(!q||c.n.toLowerCase().includes(q)||c.tel.includes(q))&&(!fEst||c.estado===fEst));
 document.getElementById('chatlist').innerHTML=rows.map(c=>{
  const i=convos.indexOf(c),presc=c.estado==='activa'?'var(--green)':'var(--amber)';
  return '<div class="crow" onclick="openChat('+i+')"><div class="av">'+ini(c.n)+'<span class="pres" style="background:'+presc+'"></span></div>'+
   '<div class="ci"><div class="cn">'+FLAG[c.loc]+c.n+'</div><div class="cp">'+c.tel+'</div><div class="cm">'+(c.ultimo||'')+'</div></div>'+
   '<div class="cmeta"><span class="pill '+c.estado+'">'+(c.estado==='activa'?'Activa':'Pausada')+'</span><span style="font-size:11px;color:var(--dim)">'+c.hora+'</span></div></div>';
 }).join('')||'<div class="empty">Sin conversaciones</div>';
}
function renderBots(){
 const data=[['Carlos','CL','Chile · Shilajit y Wild Tornado'],['Ramon','PY','Paraguay · Shilajit Extract'],['James','CO','Colombia · Reflector Solar 500W']];
 document.getElementById('botlist').innerHTML=data.map(b=>{
  const col=COL[b[0]],act=convos.filter(c=>c.bot===b[0]).length;
  return '<div class="botcard"><div class="ba" style="background:'+col+'22;color:'+col+'"><svg viewBox="0 0 24 24"><rect x="4" y="8" width="16" height="12" rx="2"/><path d="M12 8V4M9 13h.01M15 13h.01M9 17h6"/></svg></div>'+
   '<div class="bi"><div class="bn">'+FLAG[b[1]]+botName(b[0])+'</div><div class="bs">'+b[2]+' · '+act+' chats</div></div><div class="tg on"></div></div>';
 }).join('');
}

function parseHist(txt){
 if(!txt) return [];
 const parts=String(txt).split(/(?=(?:Cliente|Asistente|Ramón|Ramon|Carlos|James|Agente)\s*:)/g);
 const out=[];
 parts.forEach(p=>{ p=p.trim(); if(!p) return;
  const m=p.match(/^(Cliente|Asistente|Ramón|Ramon|Carlos|James|Agente)\s*:\s*([\s\S]*)$/);
  if(m){ const lbl=m[1], body=m[2].trim(); if(!body) return;
   const from=lbl==='Cliente'?'cliente':(lbl==='Agente'?'agente':'bot'); out.push({from,text:body}); }
  else out.push({from:'cliente',text:p});
 });
 return out;
}
async function openChat(i){
 sel=i; const c=convos[i];
 document.getElementById('mc_name').innerHTML=FLAG[c.loc]+c.n;
 document.getElementById('mc_st').textContent=c.tel+' · '+(c.estado==='activa'?'Bot activo':'En pausa · atiende agente');
 document.getElementById('mc_note').textContent=c.estado==='activa'?'Al responder, el bot se pausa automáticamente.':'Estás atendiendo esta conversación (bot en pausa).';
 document.getElementById('mc_wa').href='https://wa.me/'+soloNum(c.tel);
 document.getElementById('ovchat').classList.add('on');
 const mh=document.getElementById('mc_msgs');
 if(!c.loaded){
  mh.innerHTML='<div class="empty">Cargando conversación...</div>';
  try{
   const res=await fetch(URL_HIST+'?telefono='+soloNum(c.tel)+'&pais='+c.loc);
   const data=await res.json(); const row=Array.isArray(data)?data[0]:data;
   c.msgs=parseHist(row&&row.historial); c.loaded=true;
  }catch(e){ c.msgs=[]; c.loaded=true; }
 }
 if(sel===i) renderBubbles(c);
}
function renderBubbles(c){
 const mh=document.getElementById('mc_msgs');
 if(!c.msgs.length){ mh.innerHTML='<div class="empty">Sin mensajes todavía</div>'; return; }
 mh.innerHTML=c.msgs.map(m=>'<div class="msg '+m.from+'">'+(m.from!=='cliente'?'<span class="tag">'+(m.from==='agente'?'Tú':'Bot')+'</span>':'')+m.text+(m.time?'<span class="mt">'+m.time+'</span>':'')+'</div>').join('');
 mh.scrollTop=mh.scrollHeight;
}
function cerrarChat(){document.getElementById('ovchat').classList.remove('on');sel=-1;}
async function sendMsg(){
 if(sel<0)return; const inp=document.getElementById('mc_input'),t=inp.value.trim(); if(!t)return;
 const c=convos[sel];
 const now=new Date(),hh=now.getHours()%12||12,mm=String(now.getMinutes()).padStart(2,'0');
 c.msgs.push({from:'agente',text:t,time:hh+':'+mm}); c.estado='pausada'; inp.value=''; renderBubbles(c);
 document.getElementById('mc_st').textContent=c.tel+' · En pausa · atiende agente';
 document.getElementById('mc_note').textContent='Estás atendiendo esta conversación (bot en pausa).';
 renderChats();
 try{
  await fetch(URL_RESP,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({telefono:soloNum(c.tel),mensaje:t,pais:c.loc})});
  await fetch(URL_PAUSA,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({telefono:soloNum(c.tel),modo:'agente'})});
 }catch(e){ alert('No se pudo enviar el mensaje. Revisa la conexión.'); }
}

async function cargarVentas(){
 try{
  const res=await fetch(URL_VENTAS); const data=await res.json();
  const rows=Array.isArray(data)?data:(data.body||[]);
  const ords=[];
  rows.forEach(r=>{ if(!r||(!r.NOMBRE&&!r.PRODUCTO))return;
   const bot=String(r.BOT||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');
   const esR=bot.includes('ramon'),esJ=bot.includes('james'); const precio=numero(r.PRECIO);
   const loc=esR?'PY':esJ?'CO':'CL';
   ords.push({cli:r.NOMBRE||'—', tel:soloNum(r.TELEFONO), prod:r.PRODUCTO||'—', cant:numero(r.CANTIDAD)||1, precioNum:precio, precio:fmtLoc(loc,precio), dir:r.DIRECCION||'—', zona:r.COMUNA||r.CIUDAD||'—', region:r.REGION||r.DEPARTAMENTO||'—', bot:esR?'Ramon':esJ?'James':'Carlos', loc, estado:r.ESTADO||'—', fecha:r.FECHA||'', orden:ordenDe(r.FECHA,'')});
  });
  ordenes=ords.filter(o=>esMes(o.fecha)).sort((a,b)=>b.orden-a.orden);
  const cl=ordenes.filter(o=>o.loc==='CL'),py=ordenes.filter(o=>o.loc==='PY'),co=ordenes.filter(o=>o.loc==='CO');
  totCL=cl.reduce((a,b)=>a+b.precioNum,0);totPY=py.reduce((a,b)=>a+b.precioNum,0);totCO=co.reduce((a,b)=>a+b.precioNum,0);
  cntCL=cl.length;cntPY=py.length;cntCO=co.length;
  prodCL=cl.reduce((a,b)=>a+b.cant,0);prodPY=py.reduce((a,b)=>a+b.cant,0);prodCO=co.reduce((a,b)=>a+b.cant,0);
  renderVentas(); renderRep(); renderHoy(); construirNoti();
 }catch(e){ document.getElementById('orders').innerHTML='<div class="empty" style="color:var(--red)">Error cargando ventas</div>'; }
}
function paisCard(loc,tot,cnt){
 const c=CUR[loc];
 return '<div class="pais"'+(loc==='CO'?' style="border-color:#fbbf24"':'')+'><div class="ph"><span class="pn">'+FLAG[loc]+PAIS[loc]+'</span><span class="cur" style="background:'+c[1]+';color:'+c[2]+'">'+c[0]+'</span></div><div class="big">'+fmtLoc(loc,tot)+'</div><div class="sub">'+cnt+(cnt===1?' pedido':' pedidos')+' · ticket '+fmtLoc(loc,cnt?tot/cnt:0)+'</div></div>';
}
function renderVentas(){
 const sCL=currentBot==='todos'||currentBot==='Carlos',sPY=currentBot==='todos'||currentBot==='Ramon',sCO=currentBot==='todos'||currentBot==='James';
 let h='';
 if(sCL)h+=paisCard('CL',totCL,cntCL);
 if(sPY)h+=paisCard('PY',totPY,cntPY);
 if(sCO)h+=paisCard('CO',totCO,cntCO);
 document.getElementById('paises').innerHTML=h;
 const ords=ordenes.filter(o=>(o.bot==='Carlos'&&sCL)||(o.bot==='Ramon'&&sPY)||(o.bot==='James'&&sCO));
 document.getElementById('orders').innerHTML=ords.length?ords.map(o=>{const i=ordenes.indexOf(o);
  return '<div class="orow" onclick="openOrden('+i+')"><div class="obox"><svg viewBox="0 0 24 24"><path d="M20 7L12 3 4 7v10l8 4 8-4z"/><path d="M4 7l8 4 8-4"/></svg></div>'+
   '<div class="ci"><div class="cn">'+FLAG[o.loc]+o.cli+'</div><div class="cm">'+o.prod+' · '+o.zona+'</div></div>'+
   '<div class="oamt">'+o.precio+'<div class="od">'+o.fecha+'</div></div></div>';
 }).join(''):'<div class="empty">Sin pedidos este mes</div>';
}
const dr=(k,v)=>'<div class="drow"><span class="k">'+k+'</span><span class="v">'+v+'</span></div>';
function openOrden(i){
 const o=ordenes[i];
 document.getElementById('mo_name').innerHTML=FLAG[o.loc]+o.cli;
 document.getElementById('mo_st').textContent=PAIS[o.loc]+' · '+botName(o.bot)+' · '+o.estado;
 document.getElementById('mo_body').innerHTML=dr('Teléfono',o.tel)+dr('Producto',o.prod)+dr('Cantidad',o.cant)+dr('Precio',o.precio)+dr('Dirección',o.dir)+dr(o.loc==='CL'?'Comuna':'Ciudad',o.zona)+dr(o.loc==='CL'?'Región':'Departamento',o.region)+dr('Bot',botName(o.bot))+dr('Estado',o.estado)+dr('Fecha',o.fecha)+'<a class="wabig" href="https://wa.me/'+soloNum(o.tel)+'" target="_blank">'+WA+'Escribir por WhatsApp</a>';
 document.getElementById('ovorden').classList.add('on');
}
function cerrarOrden(){document.getElementById('ovorden').classList.remove('on');}
function renderHoy(){
 const hoy=ordenes.filter(o=>esHoy(o.fecha));
 document.getElementById('hoyList').innerHTML=hoy.length?hoy.map(o=>{const i=ordenes.indexOf(o);
  return '<div class="orow" onclick="openOrden('+i+')"><div class="obox" style="color:'+COL[o.bot]+'"><svg viewBox="0 0 24 24"><path d="M20 7L12 3 4 7v10l8 4 8-4z"/><path d="M4 7l8 4 8-4"/></svg></div><div class="ci"><div class="cn">'+FLAG[o.loc]+o.cli+'</div><div class="cm">'+o.prod+' · '+o.zona+'</div></div><div class="oamt">'+o.precio+'</div></div>';
 }).join(''):'<div class="empty">Sin ventas hoy todavía</div>';
}

function renderRep(){
 const data=[['Carlos','CL',cntCL,totCL],['Ramon','PY',cntPY,totPY],['James','CO',cntCO,totCO]];
 const max=Math.max(cntCL,cntPY,cntCO,1);
 document.getElementById('ranking').innerHTML=data.map(d=>{
  const col=COL[d[0]],pct=Math.round(d[2]/max*100);
  return '<div class="bar"><span class="bn">'+FLAG[d[1]]+botName(d[0])+'</span><div class="track"><div class="fill" style="width:'+pct+'%;background:'+col+'"></div></div><span class="bv">'+d[2]+'</span></div>';
 }).join('');
 document.getElementById('ticket').innerHTML='Ticket promedio por país<br><b>Chile</b> '+fmtCLP(cntCL?totCL/cntCL:0)+'<br><b>Paraguay</b> '+fmtGS(cntPY?totPY/cntPY:0)+'<br><b>Colombia</b> '+fmtCOP(cntCO?totCO/cntCO:0);
}

function construirNoti(){
 const arr=[];
 ordenes.filter(o=>esHoy(o.fecha)).forEach(o=>arr.push({id:'v:'+o.tel+':'+o.fecha,tipo:'venta',b:'Nueva venta',s:botName(o.bot)+' · '+o.precio+' · '+o.zona}));
 convos.filter(c=>c.estado==='pausada').forEach(c=>arr.push({id:'a:'+c.tel,tipo:'agente',b:'Atención de agente',s:c.n+' — '+(c.ultimo||'esperando')}));
 notis=arr; renderNoti();
}
function renderNoti(){
 const vis=notis.filter(n=>!dismissed.has(n.id)),bdg=document.getElementById('bellBdg');
 bdg.textContent=vis.length; bdg.style.display=vis.length?'grid':'none';
 document.getElementById('nlist').innerHTML=vis.length?vis.map(n=>{
  const c=n.tipo==='venta'?['var(--green-soft)','var(--green)']:['var(--amber-soft)','var(--amber)'];
  const ic=n.tipo==='venta'?'<path d="M20 6L9 17l-5-5"/>':'<path d="M12 2a10 10 0 1 0 0 20 10 10 0 0 0 0-20zM12 8v4M12 16h.01"/>';
  return '<div class="nrow"><div class="nico" style="background:'+c[0]+';color:'+c[1]+'"><svg viewBox="0 0 24 24">'+ic+'</svg></div><div class="ninf"><b>'+n.b+'</b><div class="ns">'+n.s+'</div></div></div>';
 }).join(''):'<div class="nempty">No hay notificaciones</div>';
}
document.getElementById('bellBtn').onclick=()=>document.getElementById('noti').classList.add('on');
document.getElementById('notiClose').onclick=()=>document.getElementById('noti').classList.remove('on');
document.getElementById('noti').onclick=function(e){if(e.target===this)this.classList.remove('on');};

function refreshActive(){
 const v=document.querySelector('.view.on').id;
 if(v==='v-inicio'){renderKpis();renderHoy();}
 else if(v==='v-chats')renderChats();
 else if(v==='v-bots')renderBots();
 else if(v==='v-ventas')renderVentas();
 else if(v==='v-rep')renderRep();
}
document.querySelectorAll('.navb').forEach(b=>b.onclick=()=>{
 document.querySelectorAll('.navb').forEach(x=>x.classList.remove('on'));b.classList.add('on');
 document.querySelectorAll('.view').forEach(v=>v.classList.remove('on'));
 document.getElementById('v-'+b.dataset.v).classList.add('on');
 cerrarChat();cerrarOrden();refreshActive();
});
document.querySelectorAll('.fest button').forEach(b=>b.onclick=()=>{
 document.querySelectorAll('.fest button').forEach(x=>x.classList.remove('on'));b.classList.add('on');
 fEst=b.dataset.est;renderChats();
});

renderChips();
cargarConvos(); cargarVentas();
setInterval(()=>{ cargarConvos(); cargarVentas(); }, 30000);
</script>
